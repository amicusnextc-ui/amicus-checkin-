name: Server Health Check

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Main Page
        run: curl -f https://amicus-checkin.vercel.app/
      - name: Check Staff Portal
        run: curl -f https://amicus-checkin.vercel.app/staff.html
      - name: Check Roster API
        run: curl -f "https://amicus-checkin.vercel.app/api/roster" --max-time 10
      - name: Check Attendance API
        run: curl -f "https://amicus-checkin.vercel.app/api/attendance" --max-time 10
      - name: Done
        run: echo 'All OK'

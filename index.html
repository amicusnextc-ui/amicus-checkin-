<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>矛聲聞毛炉赂矛驴聽矛聤陇 锚碌聬矛聹隆毛露聙 | 矛露聹矛聞聺 矛虏麓铆聛卢</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .7s linear infinite}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;position:fixed;top:0;left:0;width:100%}
}
#printArea{display:none}
</style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-screen">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-sm font-bold text-gray-900">Amicus Next Church</h1>
      <p class="text-xs text-gray-400" id="todayDate"></p>
    </div>
    <a href="/staff.html" class="text-xs text-gray-400 hover:text-indigo-600 px-2 py-1 rounded-lg hover:bg-indigo-50">锚掳聞矛聜卢 铆聫卢铆聞赂铆聞赂 芒聠聮</a>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-lg mx-auto px-4 py-8">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">芒聸陋</div>
    <h2 class="text-2xl font-bold text-gray-900">矛露聹矛聞聺 矛虏麓铆聛卢</h2>
    <p class="text-gray-400 text-sm mt-1">Check-In / Check-Out</p>
  </div>
  <div class="relative mb-6">
    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input id="searchInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="矛聺麓毛娄聞 锚虏聙矛聝聣 / Search name..."
      class="w-full pl-12 pr-12 py-4 text-lg rounded-2xl border border-gray-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-gray-300"/>
    <button id="clearBtn" onclick="clearSearch()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="results"></div>
</main>

<!-- CHECKIN CONFIRM MODAL -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
<div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 fade-in">
  <div id="modalHeader" class="text-center mb-5 p-4 rounded-2xl"></div>
  <div id="modalInfo" class="space-y-1 mb-4"></div>
  <div id="allergyAlert" class="hidden mb-4 p-3 bg-red-50 border border-red-300 rounded-xl text-red-700 text-sm font-semibold"></div>
  <div id="liabilityAlert" class="hidden mb-4 p-3 bg-amber-50 border border-amber-300 rounded-xl text-amber-700 text-sm"></div>
  <div id="guardianRow" class="hidden mb-4">
    <label class="flex items-center gap-3 cursor-pointer p-3 bg-indigo-50 rounded-xl">
      <input type="checkbox" id="guardianCheck" class="w-5 h-5 rounded accent-indigo-600"/>
      <span class="text-sm font-semibold text-indigo-700">毛鲁麓铆聵赂矛聻聬 矛聺赂锚鲁聞 铆聶聲矛聺赂</span>
    </label>
  </div>
  <div class="flex gap-3">
    <button onclick="closeModal()" class="flex-1 py-3 rounded-xl font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200">矛路篓矛聠聦</button>
    <button id="confirmBtn" onclick="doAction()" class="flex-1 py-3 rounded-xl font-bold text-white">铆聶聲矛聺赂 / Confirm</button>
  </div>
</div>
</div>

<!-- SUCCESS + TAG MODAL -->
<div id="success" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
<div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 fade-in">
  <div class="text-center mb-4">
    <div id="successIcon" class="text-5xl mb-2"></div>
    <h2 id="successTitle" class="text-xl font-bold text-gray-900"></h2>
    <p id="successTime" class="text-sm text-gray-400 mt-1"></p>
  </div>
  <!-- TAG PREVIEW -->
  <div id="tagContainer" class="hidden mb-4">
    <p class="text-xs font-bold text-gray-500 uppercase mb-2">铆聝聹锚路赂 毛炉赂毛娄卢毛鲁麓锚赂掳</p>
    <!-- Child tag -->
    <div id="childTag" class="bg-white border-2 border-gray-200 rounded-xl p-3 mb-2 relative overflow-hidden">
      <div id="tagDeptBar" class="absolute top-0 left-0 right-0 h-2 rounded-t-xl"></div>
      <div class="flex justify-between items-start mt-2">
        <div class="flex-1">
          <p id="tagName" class="text-lg font-black text-gray-900 leading-tight"></p>
          <p id="tagNameEN" class="text-xs text-gray-500"></p>
          <p id="tagDept" class="text-xs font-semibold mt-1"></p>
          <p id="tagGrade" class="text-xs text-gray-500"></p>
          <div id="tagAllergyBadge" class="hidden mt-1.5 inline-block text-xs font-bold bg-red-100 text-red-700 px-2 py-0.5 rounded-full border border-red-300">芒職聽茂赂聫 矛聲聦毛聼卢矛搂聙 矛拢录矛聺聵</div>
        </div>
        <div class="text-right ml-2">
          <canvas id="tagQR" width="56" height="56"></canvas>
          <p id="tagId" class="text-xs font-mono text-gray-400 mt-0.5 text-center"></p>
        </div>
      </div>
      <div class="mt-2 pt-2 border-t border-gray-100 flex justify-between text-xs text-gray-500">
        <span>毛鲁麓铆聵赂矛聻聬: <span id="tagGuardian" class="font-semibold text-gray-700"></span></span>
        <span id="tagDate" class="text-gray-400"></span>
      </div>
    </div>
    <!-- Guardian pickup tag -->
    <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-3">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-xs font-bold text-indigo-600 uppercase">毛鲁麓铆聵赂矛聻聬 铆聰陆矛聴聟 铆聝聹锚路赂</p>
          <p id="guardianTagName" class="text-base font-black text-gray-900 mt-0.5"></p>
          <p id="guardianTagId" class="text-xs font-mono text-indigo-500"></p>
        </div>
        <canvas id="guardianQR" width="48" height="48"></canvas>
      </div>
    </div>
  </div>
  <div class="flex gap-2">
    <button onclick="closeSuccess()" class="flex-1 py-3 rounded-xl text-gray-600 bg-gray-100 font-semibold text-sm">毛聥芦锚赂掳</button>
    <button onclick="printTag()" id="printBtn" class="hidden flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">铆聝聹锚路赂 矛聺赂矛聡聞 铆聰聞毛娄掳铆聤赂</button>
  </div>
</div>
</div>

<!-- PRINT AREA (hidden, only shown on print) -->
<div id="printArea">
  <div id="printContent" style="font-family:sans-serif;padding:8px"></div>
</div>

<script>
const DEPT_COLORS = {
  "矛聹聽矛聲聞毛露聙 (Infant)": { left:"border-l-blue-400", badge:"bg-blue-100 text-blue-800 border-blue-200", bar:"bg-blue-500" },
  "矛聹聽矛鹿聵毛露聙 (Preschool)": { left:"border-l-emerald-400", badge:"bg-emerald-100 text-emerald-800 border-emerald-200", bar:"bg-emerald-500" },
  "矛聹聽毛聟聞毛露聙 (Elementary Jr)": { left:"border-l-yellow-400", badge:"bg-yellow-100 text-yellow-800 border-yellow-200", bar:"bg-yellow-400" },
  "矛麓聢毛聯卤毛露聙 (Elementary)": { left:"border-l-orange-400", badge:"bg-orange-100 text-orange-800 border-orange-200", bar:"bg-orange-500" },
  "矛陇聭锚鲁聽毛聯卤毛露聙 (Middle/High)": { left:"border-l-purple-400", badge:"bg-purple-100 text-purple-800 border-purple-200", bar:"bg-purple-500" },
};
function hasAllergy(a){return a&&a.trim()&&a.toLowerCase()!=="矛聴聠矛聺聦"&&a.toLowerCase()!=="none";}
function deptBadge(d){const c=(DEPT_COLORS[d]||{}).badge||"bg-gray-100 text-gray-600 border-gray-200";return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full border ${c}">${d||"毛炉赂矛搂聙矛聽聲"}</span>`;}

document.getElementById("todayDate").textContent=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});

let searchTimer;
const input=document.getElementById("searchInput");
const clearBtn=document.getElementById("clearBtn");
const results=document.getElementById("results");

input.addEventListener("input",()=>{
  const q=input.value.trim();
  clearBtn.classList.toggle("hidden",!q);
  clearTimeout(searchTimer);
  if(!q){results.innerHTML=placeholder();return;}
  searchTimer=setTimeout(()=>searchStudents(q),380);
});

function clearSearch(){input.value="";clearBtn.classList.add("hidden");results.innerHTML=placeholder();input.focus();}
function placeholder(){return `<div class="text-center py-16 text-gray-300"><div class="text-5xl mb-3">冒聼聭聠</div><p class="text-sm">矛聺麓毛娄聞矛聺聞 矛聻聟毛聽楼铆聲聵矛聞赂矛職聰</p><p class="text-xs mt-1">Type a name to search</p></div>`;}
results.innerHTML=placeholder();

async function searchStudents(q){
  results.innerHTML=`<div class="text-center py-12 text-gray-400"><div class="w-8 h-8 border-2 border-indigo-200 border-t-indigo-500 rounded-full spin mx-auto mb-3"></div><p class="text-sm">锚虏聙矛聝聣 矛陇聭...</p></div>`;
  try{
    const res=await fetch(`/api/search-student?name=${encodeURIComponent(q)}`);
    const data=await res.json();
    if(!res.ok)throw new Error(data.error);
    if(!data.students||!data.students.length){
      results.innerHTML=`<div class="text-center py-12"><div class="text-4xl mb-3">冒聼聰聧</div><p class="text-gray-500 font-medium">锚虏聙矛聝聣 锚虏掳锚鲁录 矛聴聠矛聺聦</p></div>`;
      return;
    }
    results.innerHTML=`<div class="space-y-3">${data.students.map(s=>studentCard(s)).join("")}</div>`;
    data.students.forEach(s=>loadStatus(s));
  }catch(e){results.innerHTML=`<div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-red-700 text-sm text-center">芒職聽茂赂聫 ${e.message}</div>`;}
}

function studentCard(s){
  const dc=DEPT_COLORS[s.department]||{};
  const leftColor=dc.left||"border-l-gray-300";
  const allergy=hasAllergy(s.allergy);
  const noLiability=s.liabilityForm&&s.liabilityForm!=="矛聽聹矛露聹 矛聶聞毛拢聦";
  return `<div id="card-${s.id}" class="bg-white rounded-2xl shadow-sm border border-gray-100 border-l-4 ${leftColor} p-4 fade-in">
    <div class="flex flex-wrap items-center gap-2 mb-1">
      <span class="text-xl font-bold text-gray-900">${s.name}</span>
      ${s.nameEN?'<span class="text-sm text-gray-400">'+s.nameEN+'</span>':''}
      ${s.studentId?'<span class="text-xs font-mono text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">'+s.studentId+'</span>':''}
      ${s.isNew?'<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-pink-100 text-pink-700 border border-pink-200">冒聼聨聣 矛聝聢矛聥聽矛聻聬</span>':''}
      ${allergy?'<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 border border-red-200">芒職聽茂赂聫 矛聲聦毛聼卢矛搂聙</span>':''}
    </div>
    <div class="flex flex-wrap gap-2 mb-2">${deptBadge(s.department)}${s.grade?'<span class="text-xs text-gray-400">'+s.grade+'</span>':''}</div>
    ${allergy?'<p class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-1.5 border border-red-200 mb-1.5"><strong>矛聲聦毛聼卢矛搂聙:</strong> '+s.allergy+'</p>':''}
    ${noLiability?'<p class="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-1.5 border border-amber-200 mb-1.5">冒聼聯聥 Liability Form 毛炉赂矛聽聹矛露聹</p>':''}
    ${s.guardian?'<p class="text-xs text-gray-400 mb-2">毛鲁麓铆聵赂矛聻聬: ${s.guardian}${s.phone?" 脗路 "+s.phone:""}</p>':''}
    <div id="action-${s.id}" class="mt-2"><div class="text-center py-2 text-gray-400 text-sm"><span class="inline-block w-4 h-4 border-2 border-gray-200 border-t-gray-400 rounded-full spin align-middle mr-1"></span>矛聝聛铆聝聹 铆聶聲矛聺赂 矛陇聭...</div></div>
  </div>`;
}

async function loadStatus(s){
  try{
    const res=await fetch(`/api/check-status?name=${encodeURIComponent(s.name)}`);
    const data=await res.json();
    const el=document.getElementById(`action-${s.id}`);
    if(!el)return;
    if(data.status==="checked_out"){
      el.innerHTML=`<div class="bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-400 text-center">芒聹聟 矛虏麓铆聛卢矛聲聞矛聸聝 矛聶聞毛拢聦 脗路 ${data.record.checkIn} 芒聠聮 ${data.record.checkOut}</div>`;
    }else if(data.status==="checked_in"){
      el.innerHTML=`<div class="bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2 mb-2 text-sm text-emerald-700">芒聹聟 矛虏麓铆聛卢矛聺赂毛聬篓 脗路 ${data.record.checkIn} 矛聻聟矛聥陇</div>
        <button onclick='openModal("checkout",${JSON.stringify(s)},${JSON.stringify(data.record)})' class="w-full py-3.5 rounded-xl font-bold text-base bg-indigo-600 text-white hover:bg-indigo-700">矛虏麓铆聛卢矛聲聞矛聸聝 / Check Out</button>`;
    }else{
      el.innerHTML=`<button onclick='openModal("checkin",${JSON.stringify(s)},null)' class="w-full py-3.5 rounded-xl font-bold text-base bg-emerald-600 text-white hover:bg-emerald-700">矛虏麓铆聛卢矛聺赂 / Check In</button>`;
    }
  }catch(e){
    const el=document.getElementById(`action-${s.id}`);
    if(el)el.innerHTML=`<div class="text-xs text-gray-400 text-center py-2">矛聝聛铆聝聹 铆聶聲矛聺赂 矛聥陇铆聦篓</div>`;
  }
}

let _action,_student,_record;
function openModal(action,student,record){
  _action=action;_student=student;_record=record;
  const isIn=action==="checkin";
  const allergy=hasAllergy(student.allergy);
  const noLiability=student.liabilityForm&&student.liabilityForm!=="矛聽聹矛露聹 矛聶聞毛拢聦";
  document.getElementById("modalHeader").className=`text-center mb-5 p-4 rounded-2xl ${isIn?"bg-emerald-50":"bg-indigo-50"}`;
  document.getElementById("modalHeader").innerHTML=`<div class="text-4xl mb-2">${isIn?"冒聼聭聥":"冒聼聶聫"}</div><h2 class="text-xl font-bold text-gray-900">${isIn?"矛虏麓铆聛卢矛聺赂 铆聶聲矛聺赂":"矛虏麓铆聛卢矛聲聞矛聸聝 铆聶聲矛聺赂"}</h2><p class="text-gray-500 text-sm">${isIn?"Check In":"Check Out"}</p>`;
  const rows=[["矛聺麓毛娄聞",`<strong>${student.name}</strong>${student.studentId?' <span class="text-xs font-mono text-gray-400">'+student.studentId+'</span>':''}`],["毛露聙矛聞聹",deptBadge(student.department)],student.guardian?["毛鲁麓铆聵赂矛聻聬",student.guardian]:null,!isIn&&record?.checkIn?["矛虏麓铆聛卢矛聺赂",record.checkIn]:null].filter(Boolean);
  document.getElementById("modalInfo").innerHTML=rows.map(([k,v])=>`<div class="flex justify-between items-center py-2 border-b border-gray-100"><span class="text-xs text-gray-400">${k}</span><span class="text-sm text-gray-800">${v}</span></div>`).join("");
  const aa=document.getElementById("allergyAlert");
  if(allergy){aa.classList.remove("hidden");aa.innerHTML="芒職聽茂赂聫 矛聲聦毛聼卢矛搂聙 矛拢录矛聺聵: "+student.allergy;}else aa.classList.add("hidden");
  const la=document.getElementById("liabilityAlert");
  if(noLiability){la.classList.remove("hidden");la.innerHTML="冒聼聯聥 Liability Form 毛炉赂矛聽聹矛露聹 矛聝聛铆聝聹矛聻聟毛聥聢毛聥陇. 铆聶聲矛聺赂 铆聲聞矛職聰!";}else la.classList.add("hidden");
  document.getElementById("guardianRow").classList.toggle("hidden",isIn);
  document.getElementById("guardianCheck").checked=false;
  const btn=document.getElementById("confirmBtn");
  btn.className=`flex-1 py-3 rounded-xl font-bold text-white ${isIn?"bg-emerald-600 hover:bg-emerald-700":"bg-indigo-600 hover:bg-indigo-700"}`;
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){document.getElementById("modal").classList.add("hidden");}

async function doAction(){
  const btn=document.getElementById("confirmBtn");btn.textContent="矛虏聵毛娄卢 矛陇聭...";btn.disabled=true;
  const isIn=_action==="checkin";
  try{
    let time,pageId;
    if(isIn){
      const res=await fetch("/api/checkin",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:_student.name,department:_student.department,isNew:_student.isNew,hasAllergy:hasAllergy(_student.allergy),notes:_student.notes,staff:sessionStorage.getItem("sName")||""})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"矛虏麓铆聛卢矛聺赂 矛聥陇铆聦篓");
      if(data.alreadyCheckedIn){closeModal();loadStatus(_student);return;}
      time=data.checkInTime;pageId=data.pageId;
    }else{
      const res=await fetch("/api/checkout",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pageId:_record.id,guardianConfirmed:document.getElementById("guardianCheck").checked})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"矛虏麓铆聛卢矛聲聞矛聸聝 矛聥陇铆聦篓");
      time=data.checkOutTime;
    }
    closeModal();
    showSuccess(isIn,_student,time);
    loadStatus(_student);
  }catch(e){alert(e.message||"矛聵陇毛楼聵锚掳聙 毛掳聹矛聝聺铆聳聢矛聤碌毛聥聢毛聥陇");}
  btn.textContent="铆聶聲矛聺赂 / Confirm";btn.disabled=false;
}

let _successTimer;
function showSuccess(isIn,student,time){
  document.getElementById("successIcon").textContent=isIn?"冒聼聨聣":"冒聼聭聥";
  document.getElementById("successTitle").textContent=isIn?student.name+" 矛虏麓铆聛卢矛聺赂 矛聶聞毛拢聦!":student.name+" 矛虏麓铆聛卢矛聲聞矛聸聝 矛聶聞毛拢聦!";
  document.getElementById("successTime").textContent=time||"";
  document.getElementById("success").classList.remove("hidden");

  // Show tag only on check-in
  const tagContainer=document.getElementById("tagContainer");
  const printBtn=document.getElementById("printBtn");
  if(isIn){
    tagContainer.classList.remove("hidden");
    printBtn.classList.remove("hidden");
    buildTag(student,time);
  }else{
    tagContainer.classList.add("hidden");
    printBtn.classList.add("hidden");
  }
  clearTimeout(_successTimer);_successTimer=setTimeout(closeSuccess,6000);
}

function buildTag(s,time){
  const dc=DEPT_COLORS[s.department]||{};
  document.getElementById("tagDeptBar").className="absolute top-0 left-0 right-0 h-2 rounded-t-xl "+(dc.bar||"bg-gray-400");
  document.getElementById("tagName").textContent=s.name;
  document.getElementById("tagNameEN").textContent=s.nameEN||"";
  document.getElementById("tagDept").textContent=s.department||"";
  document.getElementById("tagGrade").textContent=s.grade||"";
  document.getElementById("tagId").textContent=s.studentId||"";
  document.getElementById("tagGuardian").textContent=s.guardian||"";
  document.getElementById("tagDate").textContent=new Date().toLocaleDateString("ko-KR",{month:"short",day:"numeric"})+" "+time;
  const allergyBadge=document.getElementById("tagAllergyBadge");
  if(hasAllergy(s.allergy)){allergyBadge.classList.remove("hidden");allergyBadge.textContent="芒職聽茂赂聫 矛聲聦毛聼卢矛搂聙: "+s.allergy;}
  else allergyBadge.classList.add("hidden");
  // Guardian tag
  document.getElementById("guardianTagName").textContent=s.name;
  document.getElementById("guardianTagId").textContent=s.studentId||"";
  // QR codes
  const qrData=JSON.stringify({id:s.id,name:s.name,sid:s.studentId,dept:s.department,date:new Date().toLocaleDateString("sv-SE")});
  try{
    QRCode.toCanvas(document.getElementById("tagQR"),qrData,{width:56,margin:0,color:{dark:"#1f2937",light:"#ffffff"}});

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>아미쿠스 교육부 | 출석 체크</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .25s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-screen">
<header class="bg-white/80 backdrop-blur border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-base font-bold text-gray-900">Amicus Next Church</h1>
      <p class="text-xs text-gray-400" id="todayDate"></p>
    </div>
    <a href="/admin.html" class="text-xs text-gray-400 hover:text-indigo-600 px-2 py-1 rounded-lg hover:bg-indigo-50 transition-colors">Staff →</a>
  </div>
</header>
<main class="max-w-lg mx-auto px-4 py-8">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">⛪</div>
    <h2 class="text-2xl font-bold text-gray-900">출석 체크</h2>
    <p class="text-gray-400 text-sm mt-1">Check-In / Check-Out</p>
  </div>
  <div class="relative mb-6">
    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input id="searchInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="이름 검색 / Search name..."
      class="w-full pl-12 pr-12 py-4 text-lg rounded-2xl border border-gray-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-gray-300" />
    <button id="clearBtn" onclick="clearSearch()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div id="results"></div>
</main>
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 fade-in">
    <div id="modalHeader" class="text-center mb-5 p-4 rounded-2xl"></div>
    <div id="modalInfo" class="space-y-2 mb-5"></div>
    <div id="allergyAlert" class="hidden mb-4 p-3 bg-red-50 border border-red-300 rounded-xl text-red-700 text-sm"></div>
    <div id="guardianRow" class="hidden mb-4">
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="guardianCheck" class="w-5 h-5 rounded accent-indigo-600" />
        <span class="text-sm text-gray-700">보호자 인계 확인 (Guardian confirmed)</span>
      </label>
    </div>
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-3 rounded-xl font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200">취소</button>
      <button id="confirmBtn" onclick="doAction()" class="flex-1 py-3 rounded-xl font-bold text-white transition-all">확인 / Confirm</button>
    </div>
  </div>
</div>
<div id="success" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center fade-in">
    <div id="successIcon" class="text-6xl mb-4"></div>
    <h2 id="successTitle" class="text-2xl font-bold text-gray-900 mb-1"></h2>
    <p id="successSub" class="text-gray-500 mb-4"></p>
    <p id="successName" class="text-xl font-bold text-gray-800"></p>
    <p id="successTime" class="text-sm text-gray-400 mt-1"></p>
    <button onclick="closeSuccess()" class="mt-6 px-8 py-3 rounded-xl bg-gray-100 text-gray-600 font-semibold hover:bg-gray-200">닫기 / Close</button>
  </div>
</div>
<script>
const DEPT={"유아부 (Infant)":{badge:"bg-blue-100 text-blue-800 border-blue-300",left:"border-l-blue-400"},"유치부 (Preschool)":{badge:"bg-emerald-100 text-emerald-800 border-emerald-300",left:"border-l-emerald-400"},"유년부 (Elementary Jr)":{badge:"bg-yellow-100 text-yellow-800 border-yellow-300",left:"border-l-yellow-400"},"초등부 (Elementary)":{badge:"bg-orange-100 text-orange-800 border-orange-300",left:"border-l-orange-400"},"중고등부 (Middle/High)":{badge:"bg-purple-100 text-purple-800 border-purple-300",left:"border-l-purple-400"}};
function deptBadge(d){const c=(DEPT[d]||{}).badge||"bg-gray-100 text-gray-600 border-gray-200";return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full border ${c}">${d||"미지정"}</span>`;}
function hasRealAllergy(a){return a&&a.trim()&&a.toLowerCase()!=="없음"&&a.toLowerCase()!=="none";}
document.getElementById("todayDate").textContent=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
let searchTimer;
const input=document.getElementById("searchInput");
const clearBtn=document.getElementById("clearBtn");
const results=document.getElementById("results");
input.addEventListener("input",()=>{const q=input.value.trim();clearBtn.classList.toggle("hidden",!q);clearTimeout(searchTimer);if(!q){results.innerHTML=placeholder();return;}searchTimer=setTimeout(()=>searchStudents(q),380);});
function clearSearch(){input.value="";clearBtn.classList.add("hidden");results.innerHTML=placeholder();input.focus();}
function placeholder(){return `<div class="text-center py-16 text-gray-300"><div class="text-5xl mb-3">👆</div><p class="text-sm">이름을 입력하세요</p><p class="text-xs mt-1">Type a name to search</p></div>`;}
results.innerHTML=placeholder();
async function searchStudents(q){
  results.innerHTML=`<div class="text-center py-12 text-gray-400"><div class="w-8 h-8 border-2 border-indigo-200 border-t-indigo-500 rounded-full spin mx-auto mb-3"></div><p class="text-sm">검색 중...</p></div>`;
  try{const res=await fetch(`/api/search-student?name=${encodeURIComponent(q)}`);const data=await res.json();if(!res.ok)throw new Error(data.error||"검색 오류");
  if(!data.students||!data.students.length){results.innerHTML=`<div class="text-center py-12"><div class="text-4xl mb-3">🔍</div><p class="text-gray-500 font-medium">검색 결과 없음</p><p class="text-gray-400 text-sm mt-1">No results for "${q}"</p></div>`;return;}
  results.innerHTML=`<div class="space-y-3">${data.students.map(s=>studentCard(s)).join("")}</div>`;
  data.students.forEach(s=>loadStatus(s));
  }catch(e){results.innerHTML=`<div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-red-700 text-center text-sm">⚠️ ${e.message}</div>`;}
}
function studentCard(s){const leftColor=(DEPT[s.department]||{}).left||"border-l-gray-300";const allergy=hasRealAllergy(s.allergy);
return `<div id="card-${s.id}" class="bg-white rounded-2xl shadow-sm border border-gray-100 border-l-4 ${leftColor} p-4 fade-in">
<div class="flex flex-wrap items-center gap-2"><span class="text-xl font-bold text-gray-900">${s.name}</span>${s.nameEN?`<span class="text-sm text-gray-400">${s.nameEN}</span>`:""}${s.isNew?`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-pink-100 text-pink-700 border border-pink-300">🎉 새신자</span>`:""}${allergy?`<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 border border-red-300">⚠️ 알러지</span>`:""}</div>
<div class="flex flex-wrap gap-2 mt-1.5">${deptBadge(s.department)}${s.grade?`<span class="text-xs text-gray-500">${s.grade}</span>`:""}</div>
${allergy?`<p class="mt-2 text-sm text-red-600 bg-red-50 rounded-lg px-3 py-1.5 border border-red-200"><strong>알러지:</strong> ${s.allergy}</p>`:""}
${s.notes?`<p class="mt-1.5 text-sm text-amber-700 bg-amber-50 rounded-lg px-3 py-1.5 border border-amber-200">📝 ${s.notes}</p>`:""}
${s.guardian?`<p class="mt-1.5 text-xs text-gray-400">보호자: ${s.guardian}${s.phone?" · "+s.phone:""}</p>`:""}
<div id="action-${s.id}" class="mt-4"><div class="text-center py-2 text-gray-400 text-sm"><span class="inline-block w-4 h-4 border-2 border-gray-200 border-t-gray-400 rounded-full spin align-middle mr-1"></span>상태 확인 중...</div></div>
</div>`;}
async function loadStatus(s){
  try{const res=await fetch(`/api/check-status?name=${encodeURIComponent(s.name)}`);const data=await res.json();const el=document.getElementById(`action-${s.id}`);if(!el)return;
  if(data.status==="checked_out"){el.innerHTML=`<div class="bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-500 text-center">✅ 체크아웃 완료 · ${data.record.checkIn} → ${data.record.checkOut}</div>`;}
  else if(data.status==="checked_in"){el.innerHTML=`<div class="bg-green-50 border border-green-200 rounded-xl px-4 py-2 mb-2 text-sm text-green-700">✅ 체크인됨 · ${data.record.checkIn} 입실</div><button onclick='openModal("checkout",${JSON.stringify(s)},${JSON.stringify(data.record)})' class="w-full py-3.5 rounded-xl font-bold text-base bg-indigo-600 text-white hover:bg-indigo-700 transition-colors">체크아웃 / Check Out</button>`;}
  else{el.innerHTML=`<button onclick='openModal("checkin",${JSON.stringify(s)},null)' class="w-full py-3.5 rounded-xl font-bold text-base bg-emerald-600 text-white hover:bg-emerald-700 transition-colors">체크인 / Check In</button>`;}
  }catch(e){const el=document.getElementById(`action-${s.id}`);if(el)el.innerHTML=`<div class="text-xs text-gray-400 text-center py-2">상태 확인 실패</div>`;}
}
let _action,_student,_record;
function openModal(action,student,record){_action=action;_student=student;_record=record;const isIn=action==="checkin";const allergy=hasRealAllergy(student.allergy);
document.getElementById("modalHeader").className=`text-center mb-5 p-4 rounded-2xl ${isIn?"bg-emerald-50":"bg-indigo-50"}`;
document.getElementById("modalHeader").innerHTML=`<div class="text-4xl mb-2">${isIn?"👋":"🙏"}</div><h2 class="text-xl font-bold text-gray-900">${isIn?"체크인 확인":"체크아웃 확인"}</h2><p class="text-gray-500 text-sm mt-1">${isIn?"Check In":"Check Out"}</p>`;
const rows=[["이름 / Name",`<strong>${student.name}</strong>`],["부서 / Dept",deptBadge(student.department)],student.guardian?["보호자",student.guardian]:null,!isIn&&record?.checkIn?["체크인 시간",record.checkIn]:null].filter(Boolean);
document.getElementById("modalInfo").innerHTML=rows.map(([k,v])=>`<div class="flex justify-between items-center py-2 border-b border-gray-100"><span class="text-sm text-gray-500">${k}</span><span class="text-sm text-gray-800">${v}</span></div>`).join("");
const aa=document.getElementById("allergyAlert");
if(allergy){aa.classList.remove("hidden");aa.innerHTML=`<strong>⚠️ 알러지 주의!</strong><p class="mt-0.5">${student.allergy}</p>`;}else aa.classList.add("hidden");
document.getElementById("guardianRow").classList.toggle("hidden",isIn);
document.getElementById("guardianCheck").checked=false;
const btn=document.getElementById("confirmBtn");
btn.className=`flex-1 py-3 rounded-xl font-bold text-white transition-all ${isIn?"bg-emerald-600 hover:bg-emerald-700":"bg-indigo-600 hover:bg-indigo-700"}`;
document.getElementById("modal").classList.remove("hidden");}
function closeModal(){document.getElementById("modal").classList.add("hidden");}
async function doAction(){const btn=document.getElementById("confirmBtn");btn.textContent="처리 중...";btn.disabled=true;const isIn=_action==="checkin";
try{let time;
if(isIn){const res=await fetch("/api/checkin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:_student.name,department:_student.department,isNew:_student.isNew,hasAllergy:hasRealAllergy(_student.allergy),notes:_student.notes})});const data=await res.json();if(!res.ok)throw new Error(data.error||"체크인 실패");time=data.checkInTime;}
else{const res=await fetch("/api/checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pageId:_record.id,guardianConfirmed:document.getElementById("guardianCheck").checked})});const data=await res.json();if(!res.ok)throw new Error(data.error||"체크아웃 실패");time=data.checkOutTime;}
closeModal();showSuccess(isIn,_student,time);loadStatus(_student);
}catch(e){alert(e.message||"오류가 발생했습니다");btn.textContent="확인 / Confirm";btn.disabled=false;}}
let _successTimer;
function showSuccess(isIn,student,time){document.getElementById("successIcon").textContent=isIn?"🎉":"👋";document.getElementById("successTitle").textContent=isIn?"체크인 완료!":"체크아웃 완료!";document.getElementById("successSub").textContent=isIn?"Welcome!":"See you next time!";document.getElementById("successName").textContent=student.name;document.getElementById("successTime").textContent=time||"";document.getElementById("success").classList.remove("hidden");clearTimeout(_successTimer);_successTimer=setTimeout(closeSuccess,3500);}
function closeSuccess(){document.getElementById("success").classList.add("hidden");clearTimeout(_successTimer);}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>간사 포털털 | 아미쿠스</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .7s linear infinite}
</style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 fade-in">
  <div class="text-center mb-6">
    <div class="text-5xl mb-3">👤</div>
    <h1 class="text-2xl font-bold text-gray-900">간사 포털털</h1>
    <p class="text-gray-400 text-sm mt-1">Staff Portal</p>
  </div>
  <div class="mb-4">
    <label class="block text-sm font-semibold text-gray-600 mb-2">이름 / Name</label>
    <select id="nameSelect" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base bg-white">
      <option value="">이름을 선택하세요...</option>
    </select>
  </div>
  <div class="mb-6">
    <label class="block text-sm font-semibold text-gray-600 mb-2">비밀번호 / Password</label>
    <input id="pwInput" type="password" placeholder="공통 비밀번호"
      class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base"/>
  </div>
  <div id="loginError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center"></div>
  <button onclick="doLogin()" class="w-full py-3.5 rounded-xl bg-indigo-600 text-white font-bold text-base hover:bg-indigo-700">로그인 / Login</button>
  <a href="/" class="block text-center text-sm text-gray-400 mt-4 hover:text-gray-600">← 체크인 페이지로</a>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<header class="bg-white/80 backdrop-blur border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-base font-bold text-gray-900" id="dashName"></h1>
      <p class="text-xs text-indigo-600 font-semibold" id="dashDept"></p>
    </div>
    <div class="flex gap-2 items-center">
      <button onclick="showTab('attendance')" id="tabAttendance" class="text-xs px-3 py-1.5 rounded-lg font-semibold">출석현황</button>
      <button onclick="showTab('roster')" id="tabRoster" class="text-xs px-3 py-1.5 rounded-lg font-semibold">명단</button>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-gray-600 ml-1">로그아웃</button>
    </div>
  </div>
</header>

<!-- ATTENDANCE TAB -->
<div id="attendanceTab" class="hidden max-w-2xl mx-auto px-4 py-6">
  <div class="grid grid-cols-3 gap-3 mb-5">
    <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100">
      <div class="text-3xl font-black text-emerald-600" id="statIn">-</div>
      <div class="text-xs text-gray-400 mt-1">체크인</div>
    </div>
    <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100">
      <div class="text-3xl font-black text-gray-400" id="statOut">-</div>
      <div class="text-xs text-gray-400 mt-1">체크아웃</div>
    </div>
    <div class="bg-white rounded-2xl p-4 text-center shadow-sm border border-gray-100">
      <div class="text-3xl font-black text-pink-500" id="statNew">-</div>
      <div class="text-xs text-gray-400 mt-1">새신자</div>
    </div>
  </div>
  <div class="flex items-center justify-between mb-3">
    <h2 class="font-bold text-gray-800">오늘 출석</h2>
    <button onclick="loadAttendance()" class="text-xs text-indigo-600 font-semibold">새로고침 ↻</button>
  </div>
  <div id="attendanceList"></div>
</div>

<!-- ROSTER TAB -->
<div id="rosterTab" class="hidden max-w-2xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-bold text-gray-800">학생 명단 <span id="rosterCount" class="text-sm text-gray-400 font-normal"></span></h2>
    <button onclick="openAddStudent()" class="text-xs px-3 py-2 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700">추가 +</button>
  </div>
  <input id="rosterSearch" type="text" placeholder="이름 검색..." oninput="filterRoster()"
    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm mb-4"/>
  <div id="rosterList"></div>
</div>
</div>

<!-- ADD/EDIT MODAL -->
<div id="studentModal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
<div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full sm:max-w-sm p-6 fade-in max-h-[90vh] overflow-y-auto">
  <h2 class="text-lg font-bold text-gray-900 mb-5" id="modalTitle">학생 추가</h2>
  <input type="hidden" id="editId"/>
  <div class="space-y-3">
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">이름 *</label>
      <input id="f-name" type="text" placeholder="한글 이름" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">English Name</label>
      <input id="f-nameEN" type="text" placeholder="English name" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">학년</label>
      <input id="f-grade" type="text" placeholder="1st grade" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">보호자 *</label>
      <input id="f-guardian" type="text" placeholder="보호자 이름" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">연락처</label>
      <input id="f-phone" type="tel" placeholder="010-0000-0000" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">알러지</label>
      <input id="f-allergy" type="text" placeholder="없음" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"/></div>
    <div><label class="text-xs font-bold text-gray-500 uppercase tracking-wide">특이사항</label>
      <textarea id="f-notes" placeholder="특이사항..." rows="2" class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea></div>
    <label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl bg-pink-50">
      <input type="checkbox" id="f-isNew" class="w-5 h-5 rounded accent-pink-500"/>
      <span class="text-sm font-semibold text-pink-700">새신자 (New Student)</span>
    </label>
  </div>
  <div id="modalError" class="hidden mt-3 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>
  <div class="flex gap-3 mt-5">
    <button onclick="closeStudentModal()" class="flex-1 py-3 rounded-xl font-semibold text-gray-600 bg-gray-100">취소</button>
    <button onclick="saveStudent()" id="saveBtn" class="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700">저장</button>
  </div>
</div>
</div>

<script>
let currentName = null, currentDept = null, currentPw = null;
let rosterData = [];

// Load staff list on page load
async function loadStaffList() {
  try {
    const res = await fetch('/api/staff-list');
    const data = await res.json();
    const sel = document.getElementById('nameSelect');
    (data.staff || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name; opt.textContent = s.name + ' (' + s.dept.split(' ')[0] + ')';
      sel.appendChild(opt);
    });
  } catch(e) {}
}
loadStaffList();

async function doLogin() {
  const name = document.getElementById('nameSelect').value;
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginError');
  err.classList.add('hidden');
  if (!name) { err.textContent = '이름을 선택해주세요'; err.classList.remove('hidden'); return; }
  if (!pw) { err.textContent = '비밀번호를 입력해주세요'; err.classList.remove('hidden'); return; }
  try {
    const res = await fetch(`/api/staff-auth?name=${encodeURIComponent(name)}&password=${encodeURIComponent(pw)}`);
    const data = await res.json();
    if (!data.ok) { err.textContent = data.error || '로그인 실패'; err.classList.remove('hidden'); return; }
    currentName = data.name; currentDept = data.dept; currentPw = pw;
    sessionStorage.setItem('sName', currentName);
    sessionStorage.setItem('sDept', currentDept);
    sessionStorage.setItem('sPw', currentPw);
    showDashboard();
  } catch(e) { err.textContent = '오류: ' + e.message; err.classList.remove('hidden'); }
}

function showDashboard() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('dashName').textContent = currentName + ' 간사님 환영합니다! 👋';
  document.getElementById('dashDept').textContent = currentDept;
  showTab('attendance');
}

function logout() {
  sessionStorage.clear();
  currentName = currentDept = currentPw = null;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('pwInput').value = '';
}

function showTab(tab) {
  ['attendance','roster'].forEach(t => {
    document.getElementById(t+'Tab').classList.toggle('hidden', t!==tab);
    const btn = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    btn.className = t===tab
      ? 'text-xs px-3 py-1.5 rounded-lg font-semibold bg-indigo-600 text-white'
      : 'text-xs px-3 py-1.5 rounded-lg font-semibold text-gray-500 hover:bg-gray-100';
  });
  if (tab==='attendance') loadAttendance();
  if (tab==='roster') loadRoster();
}

async function loadAttendance() {
  document.getElementById('attendanceList').innerHTML = '<div class="text-center py-8 text-gray-400"><div class="w-6 h-6 border-2 border-indigo-200 border-t-indigo-500 rounded-full spin mx-auto mb-2"></div><p class="text-sm">로딩 중...</p></div>';
  try {
    const res = await fetch(`/api/attendance-today?password=${encodeURIComponent(currentPw)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    const my = data.records.filter(r => r.department === currentDept);
    document.getElementById('statIn').textContent = my.filter(r=>!r.checkOut).length;
    document.getElementById('statOut').textContent = my.filter(r=>r.checkOut).length;
    document.getElementById('statNew').textContent = my.filter(r=>r.isNew).length;
    if (!my.length) {
      document.getElementById('attendanceList').innerHTML = '<div class="text-center py-12 text-gray-300"><div class="text-5xl mb-3">📅</div><p>오늘 출석 기록 없음</p></div>';
      return;
    }
    document.getElementById('attendanceList').innerHTML = my.map(r => `
      <div class="bg-white rounded-2xl p-4 mb-3 border border-gray-100 shadow-sm fade-in">
        <div class="flex justify-between items-start">
          <div class="flex flex-wrap items-center gap-1.5">
            <span class="font-bold text-gray-900 text-base">${r.name}</span>
            ${r.isNew?'<span class="text-xs bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full border border-pink-200">새신자</span>':''}
            ${r.hasAllergy?'<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">⚠️ 알러지</span>':''}
          </div>
          <span class="text-xs font-bold ${r.checkOut?'text-gray-400 bg-gray-100':'text-emerald-700 bg-emerald-100'} px-2 py-1 rounded-full">${r.checkOut?'체크아웃':'입실 중'}</span>
        </div>
        <div class="flex gap-4 mt-2 text-xs text-gray-400">
          ${r.checkIn?'<span>↓ '+r.checkIn+'</span>':''}
          ${r.checkOut?'<span>↑ '+r.checkOut+'</span>':''}
          ${r.guardianConfirmed?'<span class="text-emerald-600">✅ 보호자 인계</span>':''}
        </div>
        ${r.notes?'<p class="mt-2 text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-1.5">📝 '+r.notes+'</p>':''}
      </div>`).join('');
  } catch(e) {
    document.getElementById('attendanceList').innerHTML = `<div class="bg-red-50 rounded-2xl p-4 text-red-600 text-sm text-center">⚠️ ${e.message}</div>`;
  }
}

async function loadRoster() {
  document.getElementById('rosterList').innerHTML = '<div class="text-center py-8 text-gray-400"><div class="w-6 h-6 border-2 border-indigo-200 border-t-indigo-500 rounded-full spin mx-auto mb-2"></div><p class="text-sm">로딩 중...</p></div>';
  try {
    const res = await fetch(`/api/roster?dept=${encodeURIComponent(currentDept)}&password=${encodeURIComponent(currentPw)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    rosterData = data.students || [];
    document.getElementById('rosterCount').textContent = '(' + rosterData.length + '명)';
    renderRoster(rosterData);
  } catch(e) {
    document.getElementById('rosterList').innerHTML = `<div class="bg-red-50 rounded-2xl p-4 text-red-600 text-sm text-center">⚠️ ${e.message}</div>`;
  }
}

function filterRoster() {
  const q = document.getElementById('rosterSearch').value.toLowerCase();
  renderRoster(q ? rosterData.filter(s => s.name.toLowerCase().includes(q)||(s.nameEN||'').toLowerCase().includes(q)) : rosterData);
}

function renderRoster(students) {
  if (!students.length) {
    document.getElementById('rosterList').innerHTML = '<div class="text-center py-12 text-gray-300"><div class="text-4xl mb-2">👥</div><p>학생 없음</p></div>';
    return;
  }
  document.getElementById('rosterList').innerHTML = students.map(s => `
    <div class="bg-white rounded-2xl p-4 mb-3 border border-gray-100 shadow-sm fade-in">
      <div class="flex justify-between items-start">
        <div>
          <div class="flex flex-wrap items-center gap-1.5">
            <span class="font-bold text-gray-900">${s.name}</span>
            ${s.nameEN?'<span class="text-xs text-gray-400">'+s.nameEN+'</span>':''}
            ${s.isNew?'<span class="text-xs bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full border border-pink-200">새신자</span>':''}
          </div>
          ${s.grade?'<p class="text-xs text-gray-400 mt-1">'+s.grade+'</p>':''}
          ${s.guardian?'<p class="text-xs text-gray-500 mt-1">보호자: '+s.guardian+(s.phone?' · '+s.phone:'')+'</p>':''}
          ${s.allergy&&s.allergy!=='없음'?'<p class="mt-1.5 text-xs text-red-600 bg-red-50 rounded-lg px-2 py-1">⚠️ 알러지: '+s.allergy+'</p>':''}
          ${s.notes?'<p class="mt-1 text-xs text-amber-700 bg-amber-50 rounded-lg px-2 py-1">📝 '+s.notes+'</p>':''}
        </div>
        <button onclick='editStudent(${JSON.stringify(s).replace(/"/g,"&quot;")})' class="ml-3 flex-shrink-0 text-xs px-3 py-2 rounded-xl bg-indigo-50 text-indigo-600 font-semibold hover:bg-indigo-100">수정</button>
      </div>
    </div>`).join('');
}

function openAddStudent() {
  document.getElementById('modalTitle').textContent = '학생 추가';
  document.getElementById('editId').value = '';
  ['name','nameEN','grade','guardian','phone','notes'].forEach(f => document.getElementById('f-'+f).value='');
  document.getElementById('f-allergy').value = '없음';
  document.getElementById('f-isNew').checked = false;
  document.getElementById('modalError').classList.add('hidden');
  document.getElementById('studentModal').classList.remove('hidden');
}

function editStudent(s) {
  if (typeof s === 'string') s = JSON.parse(s.replace(/&quot;/g,'"'));
  document.getElementById('modalTitle').textContent = '정보 수정';
  document.getElementById('editId').value = s.id||'';
  document.getElementById('f-name').value = s.name||'';
  document.getElementById('f-nameEN').value = s.nameEN||'';
  document.getElementById('f-grade').value = s.grade||'';
  document.getElementById('f-guardian').value = s.guardian||'';
  document.getElementById('f-phone').value = s.phone||'';
  document.getElementById('f-allergy').value = s.allergy||'없음';
  document.getElementById('f-notes').value = s.notes||'';
  document.getElementById('f-isNew').checked = s.isNew||false;
  document.getElementById('modalError').classList.add('hidden');
  document.getElementById('studentModal').classList.remove('hidden');
}

function closeStudentModal() { document.getElementById('studentModal').classList.add('hidden'); }

async function saveStudent() {
  const name = document.getElementById('f-name').value.trim();
  const guardian = document.getElementById('f-guardian').value.trim();
  if (!name||!guardian) { document.getElementById('modalError').textContent='이름과 보호자는 필수'; document.getElementById('modalError').classList.remove('hidden'); return; }
  const btn = document.getElementById('saveBtn'); btn.textContent='저장 중...'; btn.disabled=true;
  try {
    const res = await fetch('/api/update-student', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id:document.getElementById('editId').value, name, dept:currentDept, password:currentPw,
        nameEN:document.getElementById('f-nameEN').value, grade:document.getElementById('f-grade').value,
        guardian, phone:document.getElementById('f-phone').value,
        allergy:document.getElementById('f-allergy').value||'없음',
        notes:document.getElementById('f-notes').value, isNew:document.getElementById('f-isNew').checked })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||'저장 실패');
    closeStudentModal(); loadRoster();
  } catch(e) { document.getElementById('modalError').textContent=e.message; document.getElementById('modalError').classList.remove('hidden'); }
  btn.textContent='저장'; btn.disabled=false;
}

// Auto-login
const sn=sessionStorage.getItem('sName'), sd=sessionStorage.getItem('sDept'), sp=sessionStorage.getItem('sPw');
if(sn&&sd&&sp){currentName=sn;currentDept=sd;currentPw=sp;showDashboard();}
</script>
</body>
</html>
